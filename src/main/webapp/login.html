<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockMaster - Connexion</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    class="bg-background min-h-screen flex items-center justify-center p-md login-gradient"
  >
    <div class="w-full max-w-[440px]">
      <div class="flex flex-col items-center mb-xl">
        <div
          class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20"
        >
          <span class="material-symbols-outlined text-white text-[32px]"
            >inventory_2</span
          >
        </div>
        <h1
          class="font-headline-sm text-headline-sm font-bold text-on-surface tracking-tight"
        >
          StockMaster
        </h1>
        <p class="font-body-md text-body-md text-secondary mt-xs">
          Solutions de stock et de facturation
        </p>
      </div>

      <div
        class="bg-surface-container-lowest p-xl rounded-xl shadow-sm border border-outline-variant"
      >
        <form id="loginForm" class="space-y-lg">
          <div class="space-y-unit">
            <label
              class="font-label-sm text-label-sm text-on-surface-variant block"
              for="username"
              >Nom d'utilisateur</label
            >
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors"
                >person</span
              >
              <input
                class="w-full pl-10 pr-4 py-3 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all font-body-md text-body-md text-on-surface outline-none"
                id="username"
                name="username"
                type="text"
                required
              />
            </div>
          </div>
          <div class="space-y-unit">
            <label
              class="font-label-sm text-label-sm text-on-surface-variant block"
              for="password"
              >Mot de passe</label
            >
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors"
                >lock</span
              >
              <input
                class="w-full pl-10 pr-4 py-3 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all font-body-md text-body-md text-on-surface outline-none"
                id="password"
                name="password"
                type="password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>
          <button
            class="w-full bg-primary hover:bg-on-primary-fixed-variant active:scale-[0.98] text-on-primary font-label-md text-label-md py-3.5 rounded-lg shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2"
            type="submit"
          >
            Se connecter
            <span class="material-symbols-outlined text-[18px]"
              >arrow_forward</span
            >
          </button>
          <div
            id="errorMessage"
            class="hidden bg-error-container text-on-error-container text-body-sm rounded-lg p-3 text-center"
          ></div>
        </form>

        <div class="relative my-xl">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-outline-variant"></div>
          </div>
          <div
            class="relative flex justify-center text-label-sm font-label-sm uppercase"
          >
            <span class="bg-surface-container-lowest px-md text-outline"
              >Comptes de démo</span
            >
          </div>
        </div>

        <div
          class="bg-surface-container-low rounded-lg p-md border border-outline-variant/50"
        >
          <div class="flex items-start gap-3">
            <span
              class="material-symbols-outlined text-primary text-[20px] mt-0.5"
              >info</span
            >
            <div class="space-y-1 font-body-sm text-body-sm text-secondary">
              <!-- <p><span class="font-semibold text-on-surface-variant">Admin :</span> admin / admin123</p>
            <p><span class="font-semibold text-on-surface-variant">Employé :</span> employee1 / employee123</p> -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="fixed top-0 right-0 -z-10 opacity-40 blur-3xl pointer-events-none"
    >
      <div
        class="w-[500px] h-[500px] bg-primary-fixed-dim rounded-full translate-x-1/2 -translate-y-1/2"
      ></div>
    </div>
    <div
      class="fixed bottom-0 left-0 -z-10 opacity-40 blur-3xl pointer-events-none"
    >
      <div
        class="w-[400px] h-[400px] bg-secondary-fixed-dim rounded-full -translate-x-1/2 translate-y-1/2"
      ></div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
